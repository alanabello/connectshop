services:
  productos:
    build:
      context: ./productos/productos
    container_name: ms-productos
    restart: on-failure
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:productosdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: 
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: 'true'
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  usuarios:
    build:
      context: ./usuarios/usuarios
    container_name: ms-usuarios
    restart: on-failure
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:usuariosdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: 
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: 'true'
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  pedidos:
    build:
      context: ./pedidos/pedidos
    container_name: ms-pedidos
    restart: on-failure
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:pedidosdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: 
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: 'true'
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      USUARIOS_SERVICE_URL: http://usuarios:8082
      PRODUCTOS_SERVICE_URL: http://productos:8081
      INVENTARIO_SERVICE_URL: http://inventario:8084
      PAGOS_SERVICE_URL: http://pagos:8085
    depends_on:
      - usuarios
      - productos
      - inventario
      - pagos

  inventario:
    build:
      context: ./inventario/inventario
    container_name: ms-inventario
    restart: on-failure
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:inventariodb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: 
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: 'true'
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  pagos:
    build:
      context: ./pagos/pagos
    container_name: ms-pagos
    restart: on-failure
    ports:
      - "8085:8085"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:mem:pagosdb
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.h2.Driver
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: 
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.H2Dialect
      SPRING_H2_CONSOLE_ENABLED: 'true'
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
